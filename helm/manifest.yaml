apiVersion: apps/v1
kind: Deployment
metadata:
  name: kagent-tools
  namespace: kagent
  labels:
    helm.sh/chart: kagent-tools-0.2.1
    app.kubernetes.io/name: kagent-tools
    app.kubernetes.io/instance: kagent
    app.kubernetes.io/version: "0.2.1"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kagent-tools
      app.kubernetes.io/instance: kagent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kagent-tools
        app.kubernetes.io/instance: kagent
    spec:
      affinity:


      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: kagent-tools
      containers:
        - name: tools
          command:
            - /tool-server
          args:
          - "--port"
          - "8084"
          - "--metrics-port"
          - "8085"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: true
          image: "ghcr.io/kagent-dev/kagent/tools:0.2.1"
          imagePullPolicy: IfNotPresent
          resources:
            limits:
              cpu: 1000m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
          env:
            - name: KAGENT_NAMESPACE
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.namespace
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: kagent-tools-openai
                  key: OPENAI_API_KEY
                  optional: true # if the secret is not found, the tool will not be available
            - name: OTEL_TRACING_ENABLED
              value: "false"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://host.docker.internal:4317"
            - name: OTEL_EXPORTER_OTLP_TRACES_TIMEOUT
              value: "15"
            - name: OTEL_EXPORTER_OTLP_TRACES_INSECURE
              value: "true"
            - name: TOKEN_PASSTHROUGH
              value: "false"
          ports:
            - name: http-tools
              containerPort: 8084
              protocol: TCP
            - name: http-metrics
              containerPort: 8085
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health
              port: http-tools
            initialDelaySeconds: 15
            periodSeconds: 15
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}

